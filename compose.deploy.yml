# Стек для VPS: образы backend/frontend из реестра (GHCR и т.п.).
# Скопируйте compose.prod.yml для db/volumes и подставьте image вместо build.
#
# Использование:
#   export BACKEND_IMAGE=ghcr.io/<owner>/<repo>/backend:latest
#   export FRONTEND_IMAGE=ghcr.io/<owner>/<repo>/frontend:latest
#   docker compose -f compose.deploy.yml --env-file .env up -d
#
# Имена образов совпадают с тегами, которые публикует CI (см. docs/DEPLOY-VPS.md).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-music_review_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      APP_ENV: ${APP_ENV:-prod}
      PORT: ${BACKEND_PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost}

      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-music_review_db}
      DB_SSLMODE: ${DB_SSLMODE:-disable}

      SEED_ENABLED: ${SEED_ENABLED:-false}
      DB_CREATE_ENABLED: ${DB_CREATE_ENABLED:-false}
      MIGRATIONS_MODE: ${MIGRATIONS_MODE:-manual}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-prod}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      AUTH_ALLOW_USER_ID_HEADER: ${AUTH_ALLOW_USER_ID_HEADER:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 15

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "${FRONTEND_PUBLISH:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
